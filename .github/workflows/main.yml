name: Dog API BDD CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Executar Testes
        run: |
          behave -f json -o report.json
        continue-on-error: true

      - name: Gerar Resumo Visual
        if: always()
        run: |
          echo "### 📊 Resumo da Execução - Dog API" >> $GITHUB_STEP_SUMMARY
          echo "| Cenário | Status | Duração |" >> $GITHUB_STEP_SUMMARY
          echo "| :--- | :--- | :--- |" >> $GITHUB_STEP_SUMMARY
          python -c "
          import json
          try:
              with open('report.json') as f:
                  data = json.load(f)
                  for feature in data:
                      for scenario in feature.get('elements', []):
                          status = '✅ PASSED' if scenario.get('status') == 'passed' else '❌ FAILED'
                          steps = scenario.get('steps', [])
                          duration = round(sum(s.get('result', {}).get('duration', 0) for s in steps), 2)
                          print(f'| {scenario[\"name\"]} | {status} | {duration}s |')
          except Exception as e:
              print(f'| Erro no Relatório | - | {e} |')
          " >> $GITHUB_STEP_SUMMARY
