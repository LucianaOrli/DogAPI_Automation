- name: Executar Testes
        run: |
          pip install behave requests
          # Geramos o log em formato JSON para o script ler depois
          behave -f json -o report.json
        continue-on-error: true # Importante: para o resumo rodar mesmo se o teste falhar

      - name: Gerar Resumo Visual (Job Summary)
        if: always()
        run: |
          echo "### 📊 Resumo da Execução - Dog API" >> $GITHUB_STEP_SUMMARY
          echo "| Cenário | Status | Duração |" >> $GITHUB_STEP_SUMMARY
          echo "| :--- | :--- | :--- |" >> $GITHUB_STEP_SUMMARY
          
          # Este comando extrai o nome do cenário, o status e o tempo do JSON
          python -c "
          import json
          try:
              with open('report.json') as f:
                  data = json.load(f)
                  for feature in data:
                      for scenario in feature['elements']:
                          status = '✅ PASSED' if scenario['status'] == 'passed' else '❌ FAILED'
                          duration = round(sum(s.get('result', {}).get('duration', 0) for s in scenario['steps']), 2)
                          print(f'| {scenario[\"name\"]} | {status} | {duration}s |')
          except Exception:
              print('| Erro ao gerar relatório | - | - |')
          " >> $GITHUB_STEP_SUMMARY
